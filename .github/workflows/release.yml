# Build AgentForge installers + signed update bundles for macOS, Linux, Windows
# and publish them to a GitHub Release. Triggered by pushing a tag like
# `v0.2.0` or by manual dispatch from the Actions tab.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY            generated locally via `npm run tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   the passphrase you chose when generating
#
# A tag push auto-publishes the release with notes extracted from CHANGELOG.md.
# Manual dispatches publish with a generic body. Once published, `latest.json`
# is exposed at:
#   https://github.com/MatjazAkeo/agentforge/releases/latest/download/latest.json
# which is the URL the in-app updater hits on bootstrap.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          # Supported: vX.Y.Z (stable) | vX.Y.Z-alpha[.N|N] | vX.Y.Z-beta[.N|N]
          # Anything else (-rc, -dev, -canary, -anythingelse) is rejected so
          # we never publish a release the in-app beta gate doesn't recognize.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+|[0-9]+)?)?$ ]]; then
            echo "::error title=Unsupported tag format::Tag '$TAG' is not a recognized release format."
            echo ""
            echo "Supported tags:"
            echo "  vX.Y.Z              stable release"
            echo "  vX.Y.Z-alpha        plain alpha"
            echo "  vX.Y.Z-alpha.N      dotted-numbered alpha (e.g. v0.2.0-alpha.3)"
            echo "  vX.Y.Z-alphaN       suffixed alpha (e.g. v0.2.0-alpha2)"
            echo "  vX.Y.Z-beta[.N|N]   same shape as alpha"
            echo ""
            echo "Other suffixes (-rc, -dev, -canary, etc.) are not supported."
            echo "Delete the tag locally + on origin, fix the version, and re-push."
            exit 1
          fi
          echo "Tag '$TAG' is a valid release format."

      - name: Extract release notes from CHANGELOG.md
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            # Pull the section between `## [VERSION]` and the next `## [`.
            NOTES=$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md)
            if [[ -z "${NOTES// }" ]]; then
              NOTES="Release ${GITHUB_REF_NAME}. See [CHANGELOG.md](https://github.com/MatjazAkeo/agentforge/blob/main/CHANGELOG.md) for details."
            fi
          else
            NOTES="Manual dispatch build. See [CHANGELOG.md](https://github.com/MatjazAkeo/agentforge/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "**macOS first launch:** the app is unsigned (no Apple Developer account). On first open, Gatekeeper will block it. Open **System Settings → Privacy & Security**, scroll down, and click **Open Anyway** next to the AgentForge entry. macOS remembers; future launches don't prompt."
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'        # Apple silicon + Intel via universal target
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal mac target needs both architectures available on the runner
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        run: npm ci

      # Windows MSI bundler requires the optional pre-release identifier to be
      # numeric-only and <= 65535. SemVer pre-releases like `beta.1` contain
      # alphabetic characters and break the MSI build. For -alpha / -beta tags
      # on Windows we skip MSI and ship NSIS (.exe) only; stable tags get both.
      - name: Compute Tauri bundle args
        id: tauri_args
        shell: bash
        run: |
          set -euo pipefail
          BASE_ARGS="${{ matrix.args }}"
          EXTRA=""
          if [[ "${{ matrix.platform }}" == "windows-latest" ]] \
             && [[ "${GITHUB_REF_NAME:-}" =~ -(alpha|beta) ]]; then
            EXTRA="--bundles app,nsis,updater"
            echo "Pre-release tag on Windows: skipping MSI bundle."
          fi
          echo "args=$BASE_ARGS $EXTRA" >> "$GITHUB_OUTPUT"

      - name: Build + bundle + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AgentForge ${{ github.ref_name }}'
          releaseBody: ${{ needs.prepare.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ steps.tauri_args.outputs.args }}
